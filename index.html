<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="js/index.js" defer></script>
    <title>Exercise List</title>
</head>
<body>
    <main class="container">
        <section class="container_form">
            <h3>Exercise Já</h3>
            <form>
                <h5 class="mt-3">Nova lista Treino</h5>
                <div class="row g-2">
                    <div class="col-12 col-sm-6 col-lg-4 input-group">
                        <span class="input-group-text">Nome Lista</span>
                        <input type="text" class="form-control" placeholder="Ex: TREINO A" id="titulo_listaTreino">
                    </div>
                </div>
                <div>
                    <label for="exercise_list">Selecione o Treino:</label>
                    <select name="exercise_list" class="form-select" id="exList">
                        <option value="-1">Escolha o treino</option>
                    </select>
                </div> 
            </form>
            <div>
                <input type="checkbox" class="form-check-input mb-3" name="checkView" id="checkView">
                <label for="checkView">Adicionar Exercício?</label>
            </div>
            <form id="form_exercise">
                <h5 class="mt-3">Novo Exercício</h5>
                <div class="row g-2">
                    <div class="col-12 col-sm-6 col-lg-4 input-group">
                        <span class="input-group-text">Treino</span>
                        <input type="text" class="form-control" placeholder="Ex: supino" id="titulo_treino">
                    </div>
                    <div class="col-12 col-sm-6 col-lg-4 input-group">
                        <span class="input-group-text">Repetições</span>
                        <input type="number" class="form-control" placeholder="Ex: 15" id="repeticoes_treino">
                    </div>
                    <div class="col-12 col-sm-6 col-lg-4 input-group">
                        <span class="input-group-text">Peso</span>
                        <input type="text" class="form-control" placeholder="Ex: 20kg" id="peso_treino">
                    </div>
                    <div class="col-12 col-sm-6 col-lg-4 input-group">
                        <span class="input-group-text">Imagem</span>
                        <input type="file" class="form-control" id="imagem_treino">
                    </div>
                    <div class="col-12 text-end mb-4">
                        <button type="button" class="btn btn-secondary" id="btn_add">Adicionar</button>
                    </div>
                </div>                
            </form>
        </section>
        <section class="container_exercise mt-2">
            <form>

            </form>
        </section>
    </main>
</body>
</html>
